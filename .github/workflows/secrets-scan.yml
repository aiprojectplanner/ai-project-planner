name: Secrets Scan

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - '**'
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Scan tracked files for secrets
        run: npm run secrets:scan
