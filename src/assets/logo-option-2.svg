<svg width="256" height="64" viewBox="0 0 256 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AI Planner Logo Option 2</title>
  <rect x="0" y="0" width="256" height="64" rx="16" fill="white"/>

  <!-- Icon: subtle grid + AI tag + gantt bars -->
  <g transform="translate(16 14)">
    <!-- subtle grid -->
    <g opacity="0.12" stroke="#0F172A" stroke-width="1">
      <rect x="0.5" y="0.5" width="44" height="36" rx="10"/>
      <path d="M15 1V36" />
      <path d="M30 1V36" />
      <path d="M1 12H44" />
      <path d="M1 24H44" />
    </g>
    <!-- gantt bars -->
    <rect x="8" y="14" width="30" height="6" rx="3" fill="#6366F1"/>
    <rect x="8" y="22" width="22" height="6" rx="3" fill="#6366F1"/>
    <rect x="8" y="30" width="34" height="6" rx="3" fill="#6366F1"/>

    <!-- AI tag -->
    <rect x="2" y="2" width="18" height="14" rx="6" fill="#6366F1"/>
    <text x="6" y="13" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="9" font-weight="900" fill="white">AI</text>
  </g>

  <!-- Text -->
  <g transform="translate(88 18)">
    <text x="0" y="20" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="20" font-weight="800" letter-spacing="-0.2">
      <tspan fill="#6366F1">AI</tspan><tspan fill="#0F172A"> Planner</tspan>
    </text>
  </g>
</svg>
