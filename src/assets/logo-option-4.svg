<svg width="256" height="64" viewBox="0 0 256 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AI Planner Logo Option 4</title>
  <rect x="0" y="0" width="256" height="64" rx="16" fill="white"/>

  <!-- Icon: geometric A from gantt bars + sparkle dot -->
  <g transform="translate(16 14)">
    <!-- left leg -->
    <rect x="8" y="6" width="8" height="30" rx="4" fill="#6366F1"/>
    <!-- right leg -->
    <rect x="30" y="6" width="8" height="30" rx="4" fill="#6366F1"/>
    <!-- cross bar -->
    <rect x="8" y="20" width="30" height="8" rx="4" fill="#6366F1" opacity="0.92"/>

    <!-- node dots to imply planning -->
    <circle cx="12" cy="36" r="2" fill="#94A3B8"/>
    <circle cx="34" cy="36" r="2" fill="#94A3B8"/>
    <circle cx="23" cy="20" r="2" fill="#94A3B8"/>

    <!-- sparkle as AI hint -->
    <path d="M44 10L45.2 13.4L48.6 14.6L45.2 15.8L44 19.2L42.8 15.8L39.4 14.6L42.8 13.4L44 10Z" fill="#6366F1"/>
  </g>

  <!-- Text -->
  <g transform="translate(88 18)">
    <text x="0" y="20" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="20" font-weight="800" letter-spacing="-0.2">
      <tspan fill="#6366F1">AI</tspan><tspan fill="#0F172A"> Planner</tspan>
    </text>
  </g>
</svg>
