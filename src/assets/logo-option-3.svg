<svg width="256" height="64" viewBox="0 0 256 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>AI Planner Logo Option 3</title>
  <rect x="0" y="0" width="256" height="64" rx="16" fill="white"/>

  <!-- Icon: rounded square + roadmap nodes + gantt bars -->
  <g transform="translate(16 14)">
    <rect x="1.5" y="1.5" width="42" height="36" rx="12" stroke="#6366F1" stroke-width="3"/>

    <!-- gantt bars (behind) -->
    <rect x="10" y="14" width="26" height="6" rx="3" fill="#6366F1" opacity="0.28"/>
    <rect x="10" y="22" width="18" height="6" rx="3" fill="#6366F1" opacity="0.28"/>

    <!-- roadmap line -->
    <path d="M12 30L21 22L32 26" stroke="#6366F1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="30" r="3" fill="#6366F1"/>
    <circle cx="21" cy="22" r="3" fill="#6366F1"/>
    <circle cx="32" cy="26" r="3" fill="#6366F1"/>

    <!-- sparkle -->
    <path d="M41 2L42.1 5.4L45.5 6.5L42.1 7.6L41 11L39.9 7.6L36.5 6.5L39.9 5.4L41 2Z" fill="#6366F1"/>
  </g>

  <!-- Text -->
  <g transform="translate(88 18)">
    <text x="0" y="20" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="20" font-weight="800" letter-spacing="-0.2">
      <tspan fill="#6366F1">AI</tspan><tspan fill="#0F172A"> Planner</tspan>
    </text>
  </g>
</svg>
